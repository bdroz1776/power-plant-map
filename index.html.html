// ── COLOR MAP ──────────────────────────────────────────────────────
const COLOR_MAP = {
  "Natural Gas Fired Combustion Turbine": "#e63946",
  "Natural Gas Fired Combined Cycle":     "#f4a261",
  "Natural Gas Fired Steam Turbine":      "#e9c46a",
  "Natural Gas Steam Turbine":            "#e9c46a",
  "Solar Photovoltaic":                   "#f9c74f",
  "Onshore Wind Turbine":                 "#90e0ef",
  "Offshore Wind Turbine":                "#0077b6",
  "Conventional Hydroelectric":           "#4cc9f0",

  "Conventional Steam Coal":              "#6d6875",
  "Petroleum Liquids":                    "#b5838d",
  "Batteries":                            "#06d6a0",

  "Landfill Gas":                         "#95d5b2",
  "Other Gases":                          "#adb5bd",
  "All Other":                            "#888888"
};

function getColor(tech) { return COLOR_MAP[tech] || "#999999"; }

function getRadius(mw) {
  if (!mw || isNaN(mw)) return 6;
  if (mw < 50)  return 5;
  if (mw < 200) return 8;
  if (mw < 500) return 12;
  return 17;
}

// ── CSV PARSER ─────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = [];
  // Parse header line respecting quotes
  let cur = '', inQ = false;
  for (let i = 0; i < lines[0].length; i++) {
    const ch = lines[0][i];
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { headers.push(cur.trim()); cur = ''; }
    else { cur += ch; }
  }
  headers.push(cur.trim());

  return lines.slice(1).map(line => {
    const cols = [];
    cur = ''; inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (cols[i] || '').replace(/^"|"$/g, ''));
    return obj;
  });
}

// ── MAP INIT ───────────────────────────────────────────────────────

  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

  .then(data => {
    L.geoJSON(data, { style: { color: '#555', weight: 1, fillOpacity: 0 }, interactive: false }).addTo(map);
  }).catch(() => {});

// ── PLOT PLANTS ────────────────────────────────────────────────────
const rows = parseCSV(CSV_DATA);
const techsSeen = new Set();

rows.forEach(row => {
  const lat  = parseFloat(row['Latitude']);
  const lon  = parseFloat(row['Longitude']);
  const mw   = parseFloat(row['Nameplate Capacity (MW)']);
  const tech = (row['Technology'] || '').trim();
  const name   = row['Plant Name'] || 'Unknown';
  const entity = row['Entity Name'] || '—';
  const county = row['County'] || '—';
  const state  = row['Plant State'] || '—';
  const ba     = row['Balancing Authority Code'] || '—';

  if (isNaN(lat) || isNaN(lon)) return;
  techsSeen.add(tech);

  const circle = L.circleMarker([lat, lon], {
    radius: getRadius(mw),
    fillColor: getColor(tech),
    color: '#333',
    weight: 0.8,
    fillOpacity: 0.85,
    interactive: true
  });

  circle.bindPopup(`
    <div style="font-size:13px;line-height:1.7;min-width:190px;">
      <strong style="font-size:14px;">${name}</strong><br>
      <b>Owner:</b> ${entity}<br>
      <b>Technology:</b> ${tech}<br>
      <b>Capacity:</b> ${isNaN(mw) ? '—' : mw + ' MW'}<br>
      <b>Location:</b> ${county} County, ${state}<br>
      <b>Balancing Authority:</b> ${ba}
    </div>
  `, { maxWidth: 280 });

  circle.addTo(map);
});

// ── LEGEND ─────────────────────────────────────────────────────────

[...techsSeen].sort().forEach(tech => {

  div.className = 'legend-item';
  div.innerHTML = `<div class="legend-dot" style="background:${getColor(tech)}"></div><span>${tech}</span>`;

});
